<!DOCTYPE HTML>
<html>
<head>
    <meta charset="utf-8">
    <title>神秘的入口</title>
    <link rel="stylesheet" type="text/css" href="css/bootstrap.min.css">
    <link rel="stylesheet" type="text/css" href="css/loading.css">
    <link rel="stylesheet" type="text/css" href="css/main.css">
    <link rel="stylesheet" type="text/css" href="template/css/entry.css">
    <link rel="stylesheet" type="text/css" href="template/css/prism.css">
    <script src="lib/jquery.js"></script>
    <script src="lib/underscore.js"></script>
    <script src="lib/base64.js"></script>
    <script src="lib/github.js"></script>
    <script src="lib/spine.js"></script>
    <script src="lib/route.js"></script>
    <script src="lib/manager.js"></script>
    <script src="template/js/hogan.min.js"></script>
    <script src="lib/showdown.js"></script>
    <script src="template/js/prism.js"></script>
    <script src="http://cdn.mathjax.org/mathjax/latest/MathJax.js?config=TeX-AMS-MML_HTMLorMML"></script>

    <script src="app.js"></script>

</head>
<body>
<div class="container">
<div id="views">
    <div id="login">
        <a id="fork" href="https://github.com/isnowfy/simple" target="_blank"><img src="http://s3.amazonaws.com/github/ribbons/forkme_right_darkblue_121621.png" alt="Fork me on GitHub"></a>
        <form class="form-horizontal">
            <div class="form-group">
                <label>神奇的入口</label>
                <div>
                    <input type="text" name="user" class="form-control" id="loginuser">
                </div>
            </div>
            <div class="form-group">
                <label>钥匙呢？</label>
                <div>
                    <input type="password" name="pass" class="form-control" id="loginpass">
                </div>
            </div>
            <div class="form-group">
                <div>
                    <input type="submit" class="btn btn-default" value="Sign in" id="loginsubmit">
                    <span class="label label-danger" id="loginerror" style="display: none;">钥匙不对啊</span>
                </div>
            </div>
        </form>
    </div>
    <div id="main">
        <div class="block">
        <h2>创建一个版本库</h2>
        <p>在<a href="https://github.com">GitHub</a>和<a href="https://github.com/new">创建一个新的存储库</a>命名username.github.io，其中用户名是您的用户名在GitHub上。（请选择“<span style="color:red">初始化这个库与自述</span>“创建时回购。)</p>
        </div>
        <div class="block">
        <h2>初始化库</h2>
        <p><a class="btn btn-primary" id="init">初始化</a></p>
        <p><span class="label label-danger" id="initerror" style="display: none;">Error! 请重试!</span></p>
        <p><span class="label label-success" id="initok" style="display: none;">初始化成功！</span></p>
        </div>
        <div class="block">
        <h2>写博客</h2>
        <p>如果你已经初始化了，你可以直接进入下一页。</p>
        <p><a class="btn btn-primary" id="go">Go</a></p>
        </div>
        </p>
    </div>
    <div id="posts" class="container-fluid">
        <div class="row">
            <div class="col-sm-3 col-md-3 sidebar">
                <a class="nav-btn btn btn-default" href="#/posts/newpost">新博文</a>
                <ul class="nav nav-sidebar" id="postItems">
                </ul>
                <a class="nav-btn btn btn-default" href="#/posts/newpage">新栏目</a>
                <ul class="nav nav-sidebar" id="pageItems">
                </ul>
            </div>
            <div class="post-content col-sm-9 col-sm-offset-3 col-md-9 col-md-offset-3">
                <div class="post-wrap-header">
                <div class="page-header">
                    <div class="form-inline">
                        <div class="form-group">
                            <input type="text" class="form-control" id="posttitle" placeholder="标题">
                            <input type="text" class="form-control" id="postpath" placeholder="Url like intro.html">
                            <input type="text" class="form-control" id="postdate" placeholder="时间">
                            <input type="text" class="form-control" id="posttags" placeholder="标签 空格设置多个">
                            <a class="btn btn-default" href="#/posts/savepost" id="postSave">保存并发表</a>
                            <a class="btn btn-danger" href="#" id="postDelete">删除</a>
                            <span class="label label-danger" style="display:none;" id="saveerror">保存出错</span>
                        </div>
                    </div>
                </div>
                </div>
                <div class="post-wrap-edit">
                <div id="editContent">
                    <textarea id="editmd"></textarea>
                    <div id="edithtml" class="entry"></div>
                </div>
                </div>
            </div>
        </div>
    </div>
</div>
<div id="loading" style="display: none;">
    <div class="spinner">
        <div class="dot1"></div>
        <div class="dot2"></div>
    </div>
</div>
</div>
<script id="postsItem" type="text/mustache">
{{#items}}
{{#active}}
<li class="nav-active">
{{/active}}
{{^active}}
<li>
{{/active}}
    <a href="#/posts/{{type}}/{{num}}">{{title}}</a>
</li>
{{/items}}
</script>
<script type="text/x-mathjax-config">
    MathJax.Hub.Config({ tex2jax: { inlineMath: [['$','$'], ["\\(", "\\)"]], processEscapes: true } });
</script>
</body>
